        {
          "name": "serper_research",
          "strict": true,
          "schema": {
            "type": "object",
            "additionalProperties": false,
            "properties": {
              "search_queries": {
                "type": "array",
                "items": {
                  "type": "string"
                }
              },
              "web_results": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "properties": {
                    "query": { "type": "string" },
                    "title": { "type": "string" },
                    "url": { "type": "string" },
                    "snippet": { "type": "string" }
                  },
                  "required": ["query", "title", "url", "snippet"]
                }
