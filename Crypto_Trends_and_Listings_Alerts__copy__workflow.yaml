  d587e7ab-cdcb-4248-af67-553a8d004443:
    type: agent
    name: Agent 1
    inputs:
      systemPrompt: |-
        You are "Crypto Report Writer", an AI agent that creates a clear, human-readable report from multiple research sources.

        You will receive a user prompt that includes:
        latest listing : <api1.data>
        trending listings: <stagehandextract1>
        Internet discovery: <agent3.web_results>
        <agent3.web_summary>
        reddit information: <agent2.reddit_posts>
        <agent2.reddit_summary>
        X information: <agent2.x_posts>, <agent2.x_summary>
        internet information:<agent3.web_results>
        <agent3.web_summary>
        Your job:

        1. Read and combine all this information.
        2. Identify the key crypto assets, themes, and narratives that matter most right now.
        3. Produce a short, structured report that:
           - Gives an executive summary
           - Lists the key assets with a simple explanation for each
           - Summarizes what is happening on Reddit and X
           - Summarizes important web findings
           - Highlights overall risks and main opportunities/themes
           - Includes a clear disclaimer (not financial advice)

        Rules:

        - Keep the language simple and easy to understand.
        - Do NOT give trading advice, price targets, or portfolio recommendations.
        - If some sources are missing or empty, still produce a report and briefly mention that data was limited.
        - Follow the response_format JSON schema exactly.
        - Output ONLY valid JSON matching the schema. No extra text outside the JSON.
      userPrompt: |-
        latest listing : <api1.data>
        trending listings: <stagehandextract1>
        Internet discovery: <agent3.web_results>
        <agent3.web_summary>
        reddit information: <agent2.reddit_posts>
        <agent2.reddit_summary>
        X information: <agent2.x_posts>, <agent2.x_summary>
        internet information:<agent3.web_results>
        <agent3.web_summary>
      model: gpt-4o
      tools: []
      responseFormat: |-
        {
          "name": "crypto_research_report",
          "strict": true,
          "schema": {
            "type": "object",
            "additionalProperties": false,
            "properties": {
              "executive_summary": {
                "type": "string"
              },
              "key_assets": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "properties": {
                    "symbol": { "type": "string" },
                    "name": { "type": "string" },
                    "source_category": {
                      "type": "string",
                      "enum": [
                        "latest_listing",
                        "trending_listing",
                        "social_trend",
                        "web_discovery",
                        "mixed"
                      ]
                    },
                    "short_description": {
                      "type": "string"
                    },
                    "social_highlight": {
                      "type": "string"
                    },
                    "web_highlight": {
                      "type": "string"
                    },
                    "risk_note": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "symbol",
                    "name",
                    "source_category",
                    "short_description",
                    "social_highlight",
                    "web_highlight",
                    "risk_note"
                  ]
                }
              },
              "social_overview": {
                "type": "object",
                "additionalProperties": false,
                "properties": {
                  "reddit_summary": { "type": "string" },
                  "x_summary": { "type": "string" },
                  "notable_reddit_points": { "type": "string" },
                  "notable_x_points": { "type": "string" }
                },
                "required": [
                  "reddit_summary",
                  "x_summary",
                  "notable_reddit_points",
                  "notable_x_points"
                ]
              },
              "web_overview": {
                "type": "string"
              },
              "overall_risks": {
                "type": "string"
              },
              "opportunities_or_themes": {
                "type": "string"
              },
              "disclaimer": {
                "type": "string"
              }
            },
            "required": [
              "executive_summary",
              "key_assets",
              "social_overview",
              "web_overview",
              "overall_risks",
              "opportunities_or_themes",
              "disclaimer"
            ]
          }
        }
    connections:
      success:
        - fd1cca95-176c-4f5d-a227-ac78482e2de6
        - d1ff50b5-42a4-4910-8a5f-e1b5d53655e5
        - ea6521c0-3681-4764-870b-030c2307f9b7
        - 3594c6fd-2361-42c2-bf68-ab857f743344
